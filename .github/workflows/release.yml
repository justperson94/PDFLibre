name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build only — do not publish to Releases'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.35.6'
          cache: true

      - name: Install create-dmg and qpdf
        run: brew install create-dmg qpdf

      - name: Flutter pub get
        run: flutter pub get

      - name: Build macOS (release)
        run: flutter build macos --release

      - name: Bundle qpdf sidecar into PDFLibre.app
        # Copy qpdf and the three Homebrew dylibs it links against into the
        # .app's Resources/ and rewrite the install names so qpdf resolves
        # its deps via @loader_path at runtime — no LD_LIBRARY_PATH or rpath
        # tricks needed. Ad-hoc codesign at the end so install_name_tool's
        # mutation does not invalidate the binary.
        run: |
          set -euxo pipefail
          APP_PATH="build/macos/Build/Products/Release/PDFLibre.app"
          RES="$APP_PATH/Contents/Resources"
          QPDF_PREFIX=$(brew --prefix qpdf)
          JPEG_PREFIX=$(brew --prefix jpeg-turbo)
          SSL_PREFIX=$(brew --prefix openssl@3)
          cp "$QPDF_PREFIX/bin/qpdf" "$RES/qpdf"
          cp -L "$QPDF_PREFIX/lib/libqpdf.30.dylib" "$RES/libqpdf.30.dylib"
          cp -L "$JPEG_PREFIX/lib/libjpeg.8.dylib" "$RES/libjpeg.8.dylib"
          cp -L "$SSL_PREFIX/lib/libcrypto.3.dylib" "$RES/libcrypto.3.dylib"
          chmod +w "$RES/qpdf" "$RES"/*.dylib
          install_name_tool -id "@rpath/libqpdf.30.dylib"   "$RES/libqpdf.30.dylib"
          install_name_tool -id "@rpath/libjpeg.8.dylib"    "$RES/libjpeg.8.dylib"
          install_name_tool -id "@rpath/libcrypto.3.dylib" "$RES/libcrypto.3.dylib"
          install_name_tool -change "@rpath/libqpdf.30.dylib" \
            "@loader_path/libqpdf.30.dylib" "$RES/qpdf"
          install_name_tool -change "$QPDF_PREFIX/lib/libqpdf.30.dylib" \
            "@loader_path/libqpdf.30.dylib" "$RES/libqpdf.30.dylib" || true
          install_name_tool -change \
            "/opt/homebrew/opt/qpdf/lib/libqpdf.30.dylib" \
            "@loader_path/libqpdf.30.dylib" "$RES/libqpdf.30.dylib" || true
          install_name_tool -change \
            "/opt/homebrew/opt/jpeg-turbo/lib/libjpeg.8.dylib" \
            "@loader_path/libjpeg.8.dylib" "$RES/libqpdf.30.dylib"
          install_name_tool -change \
            "/opt/homebrew/opt/openssl@3/lib/libcrypto.3.dylib" \
            "@loader_path/libcrypto.3.dylib" "$RES/libqpdf.30.dylib"
          codesign --force --sign - "$RES/qpdf" "$RES"/*.dylib
          "$RES/qpdf" --version

      - name: Resolve app metadata
        id: meta
        run: |
          APP_PATH="build/macos/Build/Products/Release/PDFLibre.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App bundle not found at $APP_PATH" >&2
            ls build/macos/Build/Products/Release || true
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$VERSION" ] || [ "$GITHUB_REF_NAME" = "$VERSION" ]; then
            VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          fi
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dmg_name=PDFLibre-${VERSION}-macos.dmg" >> "$GITHUB_OUTPUT"

      - name: Package as DMG
        run: |
          mkdir -p dist
          create-dmg \
            --volname "PDFLibre ${{ steps.meta.outputs.version }}" \
            --window-size 540 360 \
            --icon-size 96 \
            --icon "PDFLibre.app" 140 180 \
            --app-drop-link 400 180 \
            --no-internet-enable \
            "dist/${{ steps.meta.outputs.dmg_name }}" \
            "${{ steps.meta.outputs.app_path }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdflibre-macos
          path: dist/${{ steps.meta.outputs.dmg_name }}
          if-no-files-found: error

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && (github.event_name != 'workflow_dispatch' || inputs.dry_run == false)
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ steps.meta.outputs.dmg_name }}
          generate_release_notes: true
          draft: false
          prerelease: false

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.35.6'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Windows (release)
        run: flutter build windows --release

      - name: Bundle qpdf sidecar
        shell: pwsh
        env:
          QPDF_VERSION: '12.3.2'
        run: |
          $url = "https://github.com/qpdf/qpdf/releases/download/v$env:QPDF_VERSION/qpdf-$env:QPDF_VERSION-mingw64.zip"
          Invoke-WebRequest -Uri $url -OutFile qpdf.zip
          Expand-Archive -Path qpdf.zip -DestinationPath qpdf_extracted
          $bin = Get-ChildItem -Path qpdf_extracted -Recurse -Filter "qpdf.exe" | Select-Object -First 1
          if (-not $bin) { throw "qpdf.exe not found in archive" }
          $sourceDir = $bin.Directory.FullName
          $dest = "build/windows/x64/runner/Release/data"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          # Copy qpdf.exe plus every DLL shipped alongside it (libqpdf, jpeg,
          # zlib, etc.). They all need to sit next to the exe for it to run.
          Copy-Item "$sourceDir/qpdf.exe" -Destination $dest -Force
          Get-ChildItem -Path $sourceDir -Filter "*.dll" | ForEach-Object {
            Copy-Item $_.FullName -Destination $dest -Force
          }
          & "$dest/qpdf.exe" --version

      - name: Resolve build metadata
        id: meta
        shell: pwsh
        run: |
          $build = "build/windows/x64/runner/Release"
          if (-not (Test-Path $build)) {
            Write-Error "Build output not found at $build"
            exit 1
          }
          if ($env:GITHUB_REF_NAME -match '^v(.+)$') {
            $version = $Matches[1]
          } else {
            $line = (Select-String -Path pubspec.yaml -Pattern '^version:').Line
            $version = ($line -split '\s+')[1] -split '\+' | Select-Object -First 1
          }
          $zipName = "PDFLibre-$version-windows.zip"
          "build_dir=$build" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Package as ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "${{ steps.meta.outputs.build_dir }}/*" -DestinationPath "dist/${{ steps.meta.outputs.zip_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdflibre-windows
          path: dist/${{ steps.meta.outputs.zip_name }}
          if-no-files-found: error

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && (github.event_name != 'workflow_dispatch' || inputs.dry_run == false)
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ steps.meta.outputs.zip_name }}
          generate_release_notes: true
          draft: false
          prerelease: false

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            patchelf

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.35.6'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Linux (release)
        run: flutter build linux --release

      - name: Bundle qpdf sidecar
        env:
          QPDF_VERSION: '12.3.2'
        run: |
          set -euxo pipefail
          BUNDLE="build/linux/x64/release/bundle"
          curl -fLo qpdf.zip \
            "https://github.com/qpdf/qpdf/releases/download/v${QPDF_VERSION}/qpdf-${QPDF_VERSION}-bin-linux-x86_64.zip"
          mkdir -p qpdf_extracted
          unzip -q qpdf.zip -d qpdf_extracted
          # The archive lays out: qpdf-<ver>/bin/qpdf, qpdf-<ver>/lib/libqpdf.so*
          QPDF_BIN=$(find qpdf_extracted -type f -name 'qpdf' -perm -u+x | head -n1)
          if [ -z "$QPDF_BIN" ]; then
            echo "qpdf binary not found in archive" >&2
            find qpdf_extracted -maxdepth 3 -type f | sort
            exit 1
          fi
          QPDF_LIBDIR=$(dirname "$(dirname "$QPDF_BIN")")/lib
          mkdir -p "$BUNDLE/lib"
          cp "$QPDF_BIN" "$BUNDLE/qpdf"
          chmod +x "$BUNDLE/qpdf"
          # Copy libqpdf and any auxiliary shared objects shipped with the
          # binary so the bundled qpdf is self-contained.
          if [ -d "$QPDF_LIBDIR" ]; then
            find "$QPDF_LIBDIR" -maxdepth 1 -name '*.so*' -exec cp -P {} "$BUNDLE/lib/" \;
          fi
          # Rewrite the rpath so qpdf finds its libs at $ORIGIN/lib instead
          # of the build host's absolute path.
          patchelf --set-rpath '$ORIGIN/lib' "$BUNDLE/qpdf"
          LD_LIBRARY_PATH="$BUNDLE/lib" "$BUNDLE/qpdf" --version

      - name: Resolve build metadata
        id: meta
        run: |
          BUNDLE="build/linux/x64/release/bundle"
          if [ ! -d "$BUNDLE" ]; then
            echo "Build output not found at $BUNDLE" >&2
            ls build/linux/x64/release || true
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$VERSION" ] || [ "$GITHUB_REF_NAME" = "$VERSION" ]; then
            VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          fi
          echo "bundle_dir=$BUNDLE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tar_name=PDFLibre-${VERSION}-linux-x64.tar.gz" >> "$GITHUB_OUTPUT"
          echo "appimage_name=PDFLibre-${VERSION}-x86_64.AppImage" >> "$GITHUB_OUTPUT"
          echo "deb_name=pdflibre_${VERSION}_amd64.deb" >> "$GITHUB_OUTPUT"

      - name: Package as tar.gz
        run: |
          mkdir -p dist
          tar -czf "dist/${{ steps.meta.outputs.tar_name }}" \
            -C "${{ steps.meta.outputs.bundle_dir }}" .

      - name: Install AppImage and FUSE dependencies
        run: |
          sudo apt-get install -y libfuse2 file desktop-file-utils

      - name: Download AppImage tools
        run: |
          curl -fLo linuxdeploy-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -fLo linuxdeploy-plugin-gtk.sh \
            https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-gtk.sh

      - name: Assemble AppDir
        run: |
          mkdir -p AppDir/usr/lib/pdflibre
          cp -r ${{ steps.meta.outputs.bundle_dir }}/* AppDir/usr/lib/pdflibre/
          install -Dm755 linux/packaging/AppRun.sh AppDir/AppRun
          install -Dm644 linux/packaging/pdflibre.desktop \
            AppDir/usr/share/applications/pdflibre.desktop
          install -Dm644 linux/packaging/icons/pdflibre-256.png \
            AppDir/usr/share/icons/hicolor/256x256/apps/pdflibre.png
          cp linux/packaging/pdflibre.desktop AppDir/pdflibre.desktop
          cp linux/packaging/icons/pdflibre-256.png AppDir/pdflibre.png

      - name: Build AppImage
        env:
          DEPLOY_GTK_VERSION: '3'
          APPIMAGE_EXTRACT_AND_RUN: '1'
        run: |
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin gtk \
            --output appimage
          mv PDFLibre*.AppImage "dist/${{ steps.meta.outputs.appimage_name }}"

      - name: Assemble .deb tree
        run: |
          DEB_ROOT="deb-root"
          VERSION="${{ steps.meta.outputs.version }}"
          mkdir -p "$DEB_ROOT/DEBIAN"
          mkdir -p "$DEB_ROOT/usr/bin"
          mkdir -p "$DEB_ROOT/usr/lib/pdflibre"
          mkdir -p "$DEB_ROOT/usr/share/applications"
          mkdir -p "$DEB_ROOT/usr/share/icons/hicolor/256x256/apps"
          mkdir -p "$DEB_ROOT/usr/share/doc/pdflibre"
          cp -r ${{ steps.meta.outputs.bundle_dir }}/* "$DEB_ROOT/usr/lib/pdflibre/"
          printf '#!/bin/sh\nexec /usr/lib/pdflibre/pdflibre "$@"\n' \
            > "$DEB_ROOT/usr/bin/pdflibre"
          chmod 0755 "$DEB_ROOT/usr/bin/pdflibre"
          cp linux/packaging/pdflibre.desktop \
            "$DEB_ROOT/usr/share/applications/pdflibre.desktop"
          cp linux/packaging/icons/pdflibre-256.png \
            "$DEB_ROOT/usr/share/icons/hicolor/256x256/apps/pdflibre.png"
          cp LICENSE "$DEB_ROOT/usr/share/doc/pdflibre/copyright"
          sed "s/__VERSION__/$VERSION/" linux/packaging/deb/control.template \
            > "$DEB_ROOT/DEBIAN/control"
          install -m 0755 linux/packaging/deb/postinst.sh "$DEB_ROOT/DEBIAN/postinst"

      - name: Build .deb
        run: |
          dpkg-deb --build --root-owner-group deb-root \
            "dist/${{ steps.meta.outputs.deb_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdflibre-linux
          path: dist/*
          if-no-files-found: error

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && (github.event_name != 'workflow_dispatch' || inputs.dry_run == false)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ steps.meta.outputs.tar_name }}
            dist/${{ steps.meta.outputs.appimage_name }}
            dist/${{ steps.meta.outputs.deb_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
